<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LandIQ</title>

<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
margin:0;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 30px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:600;
color:#22c55e;
}

nav button{
background:#1e293b;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
margin-left:10px;
cursor:pointer;
}

nav button:hover{
background:#334155;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:320px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
overflow:auto;
}

.property{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.property h3{
margin:0 0 8px 0;
}

.map{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#64748b;
}

</style>

</head>

<body>

<header>

<div class="logo">
LandIQ
</div>

<nav>
<button>Map</button>
<button>Portfolio</button>
<button>DCF Model</button>
<button>Pipeline</button>
</nav>

</header>

<div class="container">

<div class="sidebar">

<div class="property">
<h3>126 Bishopsgate</h3>
Price £4.2m<br>
Yield 6.4%
</div>

<div class="property">
<h3>Former Gasworks Site</h3>
Price £8.9m<br>
Strategic Land
</div>

<div class="property">
<h3>47-49 Carnaby Street</h3>
Price £2.1m<br>
Prime West End
</div>

</div>

<div class="map">

UK Property Intelligence Platform

</div>

</div>

</body>
</html>
