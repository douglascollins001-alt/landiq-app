<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandIQ</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0d1021; color: #fff; }
    header { padding: 20px 24px; border-bottom: 1px solid #2d3150; }
    main { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 16px; padding: 16px; }
    .card { background: #151935; border: 1px solid #2d3150; border-radius: 12px; padding: 16px; }
    h1, h2, h3 { margin-top: 0; }
    button { background: #f2c94c; color: #000; border: none; border-radius: 8px; padding: 10px 12px; cursor: pointer; font-weight: 700; }
    input, textarea, select { width: 100%; padding: 10px; margin: 6px 0 10px; border-radius: 8px; border: 1px solid #3d4268; background: #0f1330; color: #fff; }
    .listing { border-top: 1px solid #2d3150; padding: 12px 0; }
    .muted { color: #b7bdd8; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { display: inline-block; background: #23284d; padding: 4px 8px; border-radius: 999px; font-size: 12px; }
    pre { white-space: pre-wrap; background: #0f1330; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>LandIQ</h1>
    <div class="muted">Listings now originate from uploaded PDFs and can be run through Investment DCF or Development Appraisal.</div>
  </header>
  <main>
    <section class="card">
      <h2>Uploaded Deals</h2>
      <input type="file" id="fileInput" accept=".pdf,.txt" />
      <button onclick="uploadFile()">Upload PDF / Text OM</button>
      <div id="uploadStatus" class="muted" style="margin-top:10px"></div>
      <div id="listings"></div>
    </section>

    <section class="card">
      <h2>Investment DCF</h2>
      <label>Purchase Price</label><input id="purchasePrice" type="number" />
      <label>NOI</label><input id="noi" type="number" />
      <label>Growth Rate</label><input id="growthRate" type="number" step="0.001" value="0.03" />
      <label>Exit Yield</label><input id="exitYield" type="number" step="0.001" value="0.055" />
      <label>Hold Years</label><input id="holdYears" type="number" value="5" />
      <label>Discount Rate</label><input id="discountRate" type="number" step="0.001" value="0.08" />
      <button onclick="runDcf()">Run Investment Model</button>
      <pre id="dcfOutput"></pre>
    </section>

    <section class="card">
      <h2>Development Appraisal</h2>
      <label>Land Price</label><input id="landPrice" type="number" />
      <label>Build Cost</label><input id="buildCost" type="number" />
      <label>Fees</label><input id="fees" type="number" />
      <label>Finance</label><input id="finance" type="number" />
      <label>Contingency</label><input id="contingency" type="number" />
      <label>GDV</label><input id="gdv" type="number" />
      <button onclick="runDev()">Run Development Appraisal</button>
      <pre id="devOutput"></pre>
    </section>
  </main>

  <script>
    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function formatMoney(value) {
      return typeof value === 'number' && !Number.isNaN(value)
        ? new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(value)
        : '—';
    }

    function prefillDcf(listing) {
      document.getElementById('purchasePrice').value = listing.price || '';
      document.getElementById('noi').value = listing.extractedFields.noi || '';
    }

    function prefillDev(listing) {
      document.getElementById('landPrice').value = listing.price || '';
      document.getElementById('gdv').value = listing.extractedFields.gdv || '';
    }

    async function loadListings() {
      const listings = await fetchJson('/api/listings');
      const root = document.getElementById('listings');
      root.innerHTML = listings.map((listing) => `
        <div class="listing">
          <h3>${listing.title}</h3>
          <div class="row">
            <span class="pill">${listing.classification}</span>
            <span class="pill">${listing.assetType || 'Unclassified asset'}</span>
          </div>
          <p class="muted">${listing.address || 'Address not found'}</p>
          <p>${listing.summary || ''}</p>
          <p><strong>Price:</strong> ${formatMoney(listing.price)} | <strong>Yield:</strong> ${listing.extractedFields.yield || '—'}% | <strong>GDV:</strong> ${formatMoney(listing.extractedFields.gdv)}</p>
          <div class="row">
            <button onclick='prefillDcf(${JSON.stringify(listing).replace(/'/g, "&#39;")})'>Run Investment Model</button>
            <button onclick='prefillDev(${JSON.stringify(listing).replace(/'/g, "&#39;")})'>Run Development Appraisal</button>
          </div>
        </div>
      `).join('') || '<p class="muted">No uploaded deals yet.</p>';
    }

    async function uploadFile() {
      const input = document.getElementById('fileInput');
      const status = document.getElementById('uploadStatus');
      if (!input.files.length) {
        status.textContent = 'Choose a PDF or text OM first.';
        return;
      }
      const formData = new FormData();
      formData.append('file', input.files[0]);
      status.textContent = 'Uploading and extracting...';
      try {
        await fetchJson('/api/listings/upload', { method: 'POST', body: formData });
        status.textContent = 'Upload complete.';
        input.value = '';
        await loadListings();
      } catch (error) {
        status.textContent = error.message;
      }
    }

    async function runDcf() {
      const payload = {
        purchasePrice: document.getElementById('purchasePrice').value,
        noi: document.getElementById('noi').value,
        growthRate: document.getElementById('growthRate').value,
        exitYield: document.getElementById('exitYield').value,
        holdYears: document.getElementById('holdYears').value,
        discountRate: document.getElementById('discountRate').value
      };
      const data = await fetchJson('/api/dcf/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      document.getElementById('dcfOutput').textContent = JSON.stringify(data, null, 2);
    }

    async function runDev() {
      const payload = {
        landPrice: document.getElementById('landPrice').value,
        buildCost: document.getElementById('buildCost').value,
        fees: document.getElementById('fees').value,
        finance: document.getElementById('finance').value,
        contingency: document.getElementById('contingency').value,
        gdv: document.getElementById('gdv').value
      };
      const data = await fetchJson('/api/dev-appraisal/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      document.getElementById('devOutput').textContent = JSON.stringify(data, null, 2);
    }

    loadListings();
  </script>
</body>
</html>
